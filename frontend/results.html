<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Squad Evaluation Results</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&family=Exo+2:ital,wght@0,300;0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="shared_auction.css">
    <style>
        body {
            background: var(--navy);
            overflow-y: auto;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }
        .results-wrapper {
            width: 100%;
            max-width: 900px;
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>

    <div class="results-wrapper" style="position: relative; z-index: 10;">
        <div id="evalLoading" style="text-align: center; padding: 100px 40px; background: rgba(12, 30, 56, 0.88); border: 1px solid var(--border-gold); border-radius: 12px; backdrop-filter: blur(10px);">
            <div class="ai-spinner" style="margin: 0 auto 30px auto; border-top-color: var(--gold); width: 60px; height: 60px;"></div>
            <div style="color: var(--gold); font-family: 'Bebas Neue'; font-size: 32px; letter-spacing: 2px;">AI IS EVALUATING SQUADS...</div>
            <div style="color: var(--fg-dim); font-size: 16px; margin-top: 15px;">Analyzing team balance, depth, and combinations...</div>
        </div>
        <div id="evalContainer" style="display: none; padding: 25px; background: rgba(12, 30, 56, 0.88); border: 1px solid var(--border-gold); border-radius: 12px; backdrop-filter: blur(10px);"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const lobbyId = urlParams.get('id');
        const socket = io();

        if (lobbyId) {
            socket.emit('join_lobby', { lobbyId, roomCode: '', role: 'viewer', teamLocalId: null, playerName: 'Viewer' });

            socket.on('state_update', (state) => {
                if (state.evaluationHtml) {
                    showResults(state.evaluationHtml);
                }
            });

            socket.on('evaluation_published', (data) => {
                showResults(data.html);
            });
        } else {
            document.getElementById('evalLoading').innerHTML = `<div style="color:red; font-size:20px;">Error: No Lobby ID provided.</div>`;
        }

        function showResults(html) {
            document.getElementById('evalLoading').style.display = 'none';
            document.getElementById('evalContainer').innerHTML = html;
            document.getElementById('evalContainer').style.display = 'block';
        }
    </script>
</body>
</html>
